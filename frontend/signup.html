<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - SpendSphere</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-layout">
  <div class="card auth-card">
    <h1>SpendSphere</h1>
    <h2>Create an Account</h2>
    <form id="signupForm">
      <div class="form-group">
        <input type="text" id="regUsername" class="form-control" placeholder="Choose a Username" required>
      </div>
      <div class="form-group">
        <input type="password" id="regPassword" class="form-control" placeholder="Choose a Password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="signupBtn">Sign Up</button>
    </form>
    <p style="margin-top: 20px; color: var(--text-muted);">
      Already have an account? <a href="login.html" style="color: var(--primary);">Login</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
