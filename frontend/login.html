<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - SpendSphere</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-layout">
  <div class="card auth-card">
    <h1>SpendSphere</h1>
    <h2>Welcome Back!</h2>
    <form id="loginForm">
      <div class="form-group">
        <input type="text" id="username" class="form-control" placeholder="Username" required>
      </div>
      <div class="form-group">
        <input type="password" id="password" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginBtn">Login</button>
    </form>
    <p style="margin-top: 20px; color: var(--text-muted);">
      Don't have an account? <a href="signup.html" style="color: var(--primary);">Sign Up</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
